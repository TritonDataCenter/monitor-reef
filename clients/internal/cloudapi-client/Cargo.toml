[package]
name = "cloudapi-client"
version = "9.20.0"
edition.workspace = true
description = "Triton CloudAPI client library (Progenitor-generated)"

[lints]
workspace = true

[lib]
name = "cloudapi_client"
path = "src/lib.rs"

[dependencies]
progenitor-client = { workspace = true }
reqwest = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
cloudapi-api = { workspace = true }
# Required for WebSocket endpoints (Progenitor-generated code)
base64 = "0.22"
rand = { workspace = true }
# Authentication support
triton-auth = { workspace = true }
# Generic list-endpoint paginator (shared with triton-gateway-client)
triton-pagination = { workspace = true }
thiserror = { workspace = true }
# clap::ValueEnum on generated enum types for CLI consumers
clap = { workspace = true }
# URL-encoding for RBAC role query parameters
urlencoding = "2"
# Constructing fake HTTP responses in emit-payload mode (debug builds only)
http = "1"

[dev-dependencies]
tokio = { workspace = true }
