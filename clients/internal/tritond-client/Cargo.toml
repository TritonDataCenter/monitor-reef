[package]
name = "tritond-client"
version = "0.1.0"
edition.workspace = true

[lints]
workspace = true

[lib]
name = "tritond_client"
path = "src/lib.rs"

[dependencies]
chrono = { workspace = true }
progenitor-client = { workspace = true }
reqwest = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tritond-logs = { workspace = true }
tritond-metrics = { workspace = true }
uuid = { workspace = true }
# Required for the WebSocket `#[channel]` endpoints: Progenitor-generated
# upgrade-handshake code builds the `Sec-WebSocket-Key` nonce with these.
base64 = { workspace = true }
rand = { workspace = true }
