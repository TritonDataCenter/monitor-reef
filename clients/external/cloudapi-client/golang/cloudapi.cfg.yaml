# oapi-codegen configuration for Triton CloudAPI Go client
# Source spec: openapi-specs/patched/cloudapi-api.json
#
# Naming collisions between spec schemas and oapi-codegen's auto-generated
# type names (oneOf variants, response wrappers) are resolved upstream via
# #[schemars(rename)] in the Rust API type definitions.
package: cloudapi
output: clients/external/cloudapi-client/golang/cloudapi.gen.go
generate:
  client: true
  models: true
  embedded-spec: false
output-options:
  name-normalizer: ToCamelCaseWithInitialisms
  # Emit orphan schemas in components.schemas. Needed because the
  # action-dispatch request structs (StartMachineRequest, ExportImageRequest,
  # etc.) are injected by openapi-manager for the typed-wrapper layer but are
  # not referenced by any endpoint body. See docs/design/action-dispatch-openapi.md.
  skip-prune: true
