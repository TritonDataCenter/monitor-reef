[package]
name = "tritonagent"
version = "0.1.0"
edition.workspace = true
description = "Per-CN provisioning agent for the Triton Cloud control plane"

[lints]
workspace = true

[lib]
name = "tritonagent"
path = "src/lib.rs"

[[bin]]
name = "tritonagent"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true }
futures-util = { workspace = true }
hostname = { workspace = true }
postcard = { workspace = true }
proteus-api = { path = "../../../proteus/crates/proteus-api", features = ["std"] }
proteus-ioctl = { path = "../../../proteus/crates/proteus-ioctl" }
reqwest = { workspace = true }
rustls = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tritond-client = { workspace = true }
tritond-cn-platform = { workspace = true }
tritond-image-manifest = { workspace = true }
uuid = { workspace = true }
webpki-roots = { workspace = true }

[dev-dependencies]
chrono = { workspace = true }
dropshot = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true }
tritond = { workspace = true }
tritond-audit = { workspace = true }
tritond-auth = { workspace = true }
tritond-store = { workspace = true }
