[package]
name = "tritonagent"
version = "0.1.0"
edition.workspace = true
description = "Per-CN provisioning agent for the Triton Cloud control plane"

[lints]
workspace = true

[lib]
name = "tritonagent"
path = "src/lib.rs"

[[bin]]
name = "tritonagent"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
hostname = { workspace = true }
reqwest = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tritond-client = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
chrono = { workspace = true }
dropshot = { workspace = true }
tokio = { workspace = true }
tritond = { workspace = true }
tritond-audit = { workspace = true }
tritond-auth = { workspace = true }
tritond-store = { workspace = true }
