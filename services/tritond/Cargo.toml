[package]
name = "tritond"
version = "0.1.0"
edition.workspace = true

[lints]
workspace = true

[features]
default = []
# Compile in the FoundationDB backends (storage + audit chain).
# Builds with this feature require libfdb_c.so on the build/run host.
foundationdb = [
    "tritond-store/foundationdb",
    "tritond-audit/foundationdb",
    "tritond-saga/foundationdb",
]

[lib]
name = "tritond"
path = "src/lib.rs"

[[bin]]
name = "tritond"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
cedar-policy = { workspace = true }
chrono = { workspace = true }
dropshot = { workspace = true }
edge-manifest = { workspace = true }
futures-util = { workspace = true }
governor = { workspace = true }
hex = { workspace = true }
hmac = { workspace = true }
http = { workspace = true }
mantad-client = { path = "../../../manta-storage/crates/mantad-client" }
postcard = { workspace = true }
proteus-api = { path = "../../../proteus/crates/proteus-api", features = ["std"] }
reqwest = { workspace = true }
rustls = { workspace = true }
schemars = { workspace = true }
semver = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
ssh-key = { workspace = true }
tempfile = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tritond-api = { workspace = true }
tritond-audit = { workspace = true }
tritond-auth = { workspace = true }
imgapi-manifest = { workspace = true }
tritond-image-manifest = { workspace = true }
tritond-logs = { workspace = true }
tritond-metrics = { workspace = true, features = ["clickhouse"] }
tritond-placement = { workspace = true }
tritond-saga = { workspace = true }
slog = { workspace = true }
tritond-store = { workspace = true }
triton-vpc = { path = "../../../proteus/plugins/triton-vpc", features = ["std"] }
urlencoding = { workspace = true }
uuid = { workspace = true }
webpki-roots = { workspace = true }
x509-parser = { workspace = true }

[dev-dependencies]
axum = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true }
dropshot = { workspace = true }
futures-util = { workspace = true }
hex = { workspace = true }
jsonwebtoken = { workspace = true }
progenitor-client = { workspace = true }
rcgen = { workspace = true }
reqwest = { workspace = true }
rsa = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
ssh-key = { workspace = true }
tokio-rustls = { workspace = true }
tokio-tungstenite = { workspace = true }
tritond-audit = { workspace = true }
tritond-auth = { workspace = true }
tritond-client = { workspace = true }
uuid = { workspace = true }
