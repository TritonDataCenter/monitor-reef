[package]
name = "tritond"
version = "0.1.0"
edition.workspace = true

[lints]
workspace = true

[features]
default = []
# Compile in the FoundationDB backends (storage + audit chain).
# Builds with this feature require libfdb_c.so on the build/run host.
foundationdb = ["tritond-store/foundationdb", "tritond-audit/foundationdb"]

[lib]
name = "tritond"
path = "src/lib.rs"

[[bin]]
name = "tritond"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
cedar-policy = { workspace = true }
chrono = { workspace = true }
dropshot = { workspace = true }
governor = { workspace = true }
http = { workspace = true }
schemars = { workspace = true }
semver = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
ssh-key = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tritond-api = { workspace = true }
tritond-audit = { workspace = true }
tritond-auth = { workspace = true }
tritond-store = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
axum = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true }
dropshot = { workspace = true }
jsonwebtoken = { workspace = true }
progenitor-client = { workspace = true }
reqwest = { workspace = true }
rsa = { workspace = true }
serde_json = { workspace = true }
ssh-key = { workspace = true }
tritond-audit = { workspace = true }
tritond-auth = { workspace = true }
tritond-client = { workspace = true }
uuid = { workspace = true }
