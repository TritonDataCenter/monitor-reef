[package]
name = "tritond"
version = "0.1.0"
edition.workspace = true

[lints]
workspace = true

[lib]
name = "tritond"
path = "src/lib.rs"

[[bin]]
name = "tritond"
path = "src/main.rs"

[dependencies]
