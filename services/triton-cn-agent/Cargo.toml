[package]
name = "triton-cn-agent"
version = "0.1.0"
edition.workspace = true
description = "Triton Compute Node Agent (Rust port of sdc-cn-agent)"

[lints]
workspace = true

[[bin]]
name = "triton-cn-agent"
path = "src/main.rs"

[lib]
name = "triton_cn_agent"
path = "src/lib.rs"

[dependencies]
anyhow = { workspace = true }
async-trait = "0.1"
base64 = "0.22"
chrono = { workspace = true, features = ["serde"] }
clap = { workspace = true, features = ["derive", "env"] }
cn-agent-api = { path = "../../apis/cn-agent-api" }
dropshot = { workspace = true }
notify = "8.2"
# We deliberately bypass the workspace's default reqwest features
# (`rustls`) here because the workspace version pulls in
# `rustls-platform-verifier`, which fails to initialize on illumos (no
# `/etc/ssl/certs/ca-certificates.crt` in the global zone). CNAPI is
# always reachable over plain HTTP from a compute node; if we ever need
# TLS, swap in `rustls-no-provider` and a webpki-roots provider.
reqwest = { version = "0.13", default-features = false, features = ["json"] }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
# Pinned directly rather than via the workspace: `sha2` is only used by the
# recovery_config task, and adding it to the workspace would pull it into
# every downstream crate unnecessarily.
sha2 = "0.10"
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
