[package]
name = "identityd"
version = "0.1.0"
edition.workspace = true
description = "Minimal native OpenID Connect provider for Triton Cloud (RFD 00004)."
license = "MPL-2.0"

[lints]
workspace = true

[features]
default = []
# Enable the FoundationDB-backed `IdentityStore`. Without it `identityd`
# is MemStore-only (zero-config dev). Requires libfdb_c.so on the host.
foundationdb = ["identity-store/foundationdb"]

[[bin]]
name = "identityd"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
base64 = { workspace = true }
bcrypt = { workspace = true }
chrono = { workspace = true }
dropshot = { workspace = true }
http = { workspace = true }
identity-store = { workspace = true }
identity-token = { workspace = true }
identityd-api = { workspace = true }
jsonwebtoken = { workspace = true }
rsa = { workspace = true, features = ["pem"] }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
reqwest = { workspace = true, features = ["json"] }
# `file_locks` gives the cross-process `#[file_serial]` lock so the
# server-spawning integration tests (which share the fixed bind port) never
# run concurrently, even across separate test binaries.
serial_test = { workspace = true, features = ["file_locks"] }
serde_json = { workspace = true }
tokio = { workspace = true }
