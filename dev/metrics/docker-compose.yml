# Single-node ClickHouse for the dev metrics sink.
#
# Bring up:   docker compose -f dev/metrics/docker-compose.yml up -d
# Tear down:  docker compose -f dev/metrics/docker-compose.yml down -v
#
# The schema in init/01_schema.sql mirrors oxide/oximeter's per-datum-
# type MergeTree layout: one table per datum kind, ordered by
# (timeseries_name, timeseries_key, timestamp). TTL is set to 30 days
# on each table -- match the V5 dashboard's longest range button so
# the graph never asks for data the store doesn't keep.
#
# tritond's `MetricsStore` trait has a `RingBufferStore` default; the
# ClickHouse-backed impl is wired by setting:
#
#   TRITOND_METRICS_STORE=clickhouse
#   TRITOND_METRICS_CLICKHOUSE_URL=http://localhost:8123
#
# in tritond's environment. With the env unset, the in-memory ring
# buffer takes over -- ideal for `cargo test` and laptop dev.

services:
  clickhouse:
    # 24.x LTS; matches what oxide/omicron pins to in current main.
    # Newer 25.x releases are fine but bump after we've verified the
    # tritond clickhouse client library still issues the same DDL.
    image: clickhouse/clickhouse-server:24.8
    container_name: tritond-metrics-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP interface (for admin-backend / curl)
      - "9000:9000"   # Native TCP (for the official Rust clickhouse crate)
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./init:/docker-entrypoint-initdb.d:ro
    ulimits:
      # ClickHouse's default ulimits trip on macOS/colima setups; the
      # bundled image asks for 262144 nofile + 8192 nproc.
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  clickhouse-data:
