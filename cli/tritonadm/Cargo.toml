[package]
name = "tritonadm"
version = "0.1.0"
edition.workspace = true
description = "CLI for Triton datacenter administration (Rust successor to sdcadm)"

[lints]
workspace = true

[[bin]]
name = "tritonadm"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive", "env"] }
clap_complete = "4.4"
sapi-client = { path = "../../clients/internal/sapi-client" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
triton-tls = { path = "../../libs/triton-tls" }
vmapi-client = { path = "../../clients/internal/vmapi-client" }

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.0"
