# tritonadm setup config. Copy, edit the IPs, then run on the headnode GZ:
#   tritonadm setup apply --config setup.toml
#
# CLI flags override any value here. NO secrets live in this file — the
# FDB cluster secret is freshly generated by setup unless you pass
# --fdb-secret. Use --dry-run first to print the vmadm payloads.

nic_tag  = "admin"
netmask  = "255.255.255.0"
gateway  = "172.16.96.1"
resolver = "8.8.8.8"

# Control-plane zone admin IPs (free, on the admin net). fdb + tritond
# are required; provision fdb first (setup gates tritond on FDB health).
fdb_ip     = "172.16.96.40"
tritond_ip = "172.16.96.41"

# Optional zones (also enable with --with-mantad / --with-clickhouse).
with_mantad     = false
mantad_ip       = "172.16.96.42"
with_clickhouse = false
clickhouse_ip   = "172.16.96.43"

# channel_url = "https://us-central.manta.mnx.io/.../channels/stable.json"
