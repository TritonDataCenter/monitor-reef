[package]
name = "triton-cli"
version = "1.0.0"
edition.workspace = true
description = "User-friendly CLI for Triton CloudAPI"

[lints]
workspace = true

[[bin]]
name = "triton"
path = "src/main.rs"

[dependencies]
triton-auth = { workspace = true }
cloudapi-client = { workspace = true }
cloudapi-api = { workspace = true }
clap = { workspace = true }
clap_complete = "4.4"
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = "0.9"
anyhow = { workspace = true }
thiserror = { workspace = true }
dirs = { workspace = true }
comfy-table = "7.0"
dialoguer = "0.12"
indicatif = "0.18"
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
getrandom = "0.3"
rpassword = "7"
chrono = { workspace = true }
reqwest = { workspace = true }
strum = { workspace = true }

# TLS certificate fallback for platforms where native cert probing fails (e.g., illumos)
rustls = { version = "0.23", default-features = false, features = ["std", "tls12"] }
rustls-native-certs = "0.8"
rustls-pemfile = "2"
webpki-roots = "1"

# VNC proxy dependencies
tokio-tungstenite = { workspace = true }
futures-util = "0.3"
http = { workspace = true }
axum = { workspace = true }
tempfile = { workspace = true }

[build-dependencies]
build-data = { workspace = true }

[dev-dependencies]
assert_cmd = { workspace = true }   # CLI testing with command assertions
predicates = { workspace = true }   # Fluent assertions for stdout/stderr
test-case = "3.3"         # Parameterized tests
pretty_assertions = "1.4" # Better diff output for test failures
hostname = "0.4"          # Get hostname for unique test resource names
regex = "1.10"            # Regex for extracting UUIDs from output
rcgen = { workspace = true }  # Self-signed certs for TLS tests
tokio-rustls = "0.26"     # TLS server for insecure-mode tests
