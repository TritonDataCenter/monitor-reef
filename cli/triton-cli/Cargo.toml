[package]
name = "triton-cli"
version = "1.0.0"
edition.workspace = true
description = "User-friendly CLI for Triton CloudAPI"

[lints]
workspace = true

[[bin]]
name = "triton"
path = "src/main.rs"

[dependencies]
triton-auth = { workspace = true }
triton-tls = { workspace = true }
triton-gateway-client = { workspace = true }
cloudapi-api = { workspace = true }
clap = { workspace = true }
clap_complete = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = "0.9"
anyhow = { workspace = true }
thiserror = { workspace = true }
dirs = { workspace = true }
comfy-table = "7.0"
dialoguer = "0.12"
indicatif = "0.18"
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
getrandom = "0.3"
rpassword = "7"
async-trait = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true }
reqwest = { workspace = true }
strum = { workspace = true }


# VNC proxy dependencies
tokio-tungstenite = { workspace = true }
futures-util = { workspace = true }
http = "1.0"
axum = { workspace = true }
tempfile = { workspace = true }

[build-dependencies]
build-data = { workspace = true }

[dev-dependencies]
assert_cmd = { workspace = true }  # CLI testing with command assertions
predicates = { workspace = true }  # Fluent assertions for stdout/stderr
test-case = "3.3"         # Parameterized tests
pretty_assertions = "1.4" # Better diff output for test failures
hostname = "0.4"          # Get hostname for unique test resource names
regex = "1.10"            # Regex for extracting UUIDs from output
rcgen = { workspace = true }  # Self-signed certs for TLS tests
rustls = { workspace = true }
# TLS server for insecure-mode tests.
tokio-rustls = { workspace = true }
