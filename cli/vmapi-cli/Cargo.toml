[package]
name = "vmapi-cli"
version = "9.17.0"
edition.workspace = true
description = "CLI for Triton VMAPI"

[lints]
workspace = true

[[bin]]
name = "vmapi"
path = "src/main.rs"

[dependencies]
vmapi-api = { path = "../../apis/vmapi-api" }
vmapi-client = { path = "../../clients/internal/vmapi-client" }
clap = { workspace = true, features = ["env"] }
tokio = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.0"
