# Local Triton Cloud development stack.
#
# Phase 0 ships only tritond. Phase 0b will add a foundationdb service
# alongside it; downstream services will join as they are written.

services:
  tritond:
    build:
      context: .
      dockerfile: Dockerfile
    image: tritond:dev
    container_name: tritond
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info
      TRITOND_BIND_ADDRESS: 0.0.0.0:8080
    restart: unless-stopped
