[package]
name = "tritond-audit"
version = "0.1.0"
edition.workspace = true
description = "Tamper-evident audit log primitives for the Triton Cloud control plane"
license = "MPL-2.0"

[lints]
workspace = true

[features]
default = []
# FoundationDB-backed [`Chain`]. Requires libfdb_c.so on the build/run host.
foundationdb = ["dep:foundationdb"]

[dependencies]
async-trait = { workspace = true }
chrono = { workspace = true }
foundationdb = { workspace = true, optional = true }
hex = "0.4"
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
