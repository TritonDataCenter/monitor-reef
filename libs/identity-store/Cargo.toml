[package]
name = "identity-store"
version = "0.1.0"
edition.workspace = true
description = "Persistence layer for identityd, the Triton Cloud identity service"
license = "MPL-2.0"

[lints]
workspace = true

[features]
default = []
# FoundationDB-backed `IdentityStore` implementation (`fdb` module).
# Requires libfdb_c.so on the build/run host (FDB 7.3.x+). Mirrors
# `tritond-store`'s `foundationdb` feature. The keyspace lays every key
# under the `identity/...` prefix (separate from tritond's `triton/...`).
foundationdb = ["dep:foundationdb", "dep:sha2"]

[dependencies]
async-trait = { workspace = true }
chrono = { workspace = true }
foundationdb = { workspace = true, optional = true }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true, optional = true }
thiserror = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
zeroize = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
