[package]
name = "triton-auth"
version = "0.1.0"
edition.workspace = true
description = "HTTP Signature authentication library for Triton CloudAPI"
license = "MPL-2.0"

[lints]
workspace = true

[dependencies]
ssh-key = { version = "0.6", features = ["ed25519", "rsa", "ecdsa", "encryption"] }
ssh-encoding = "0.2"
base64 = { workspace = true }
md-5 = "0.10"
chrono = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
dirs = { workspace = true }

# Traditional PEM format support (PKCS#1, SEC1, DSA)
rsa = { version = "0.9", features = ["sha2"] }
p256 = { version = "0.13", features = ["ecdsa"] }
p384 = { version = "0.13", features = ["ecdsa"] }
dsa = "0.6"
sha1 = "0.10"
sha2 = "0.10"
pkcs8 = "0.10"
sec1 = { version = "0.7", features = ["pem"] }
pem-rfc7468 = { version = "1.0", features = ["alloc"] }
signature = "2.2"

# Encrypted PKCS#1 PEM decryption
aes = "0.8"
cbc = "0.1"
des = "0.8"

# X.509 certificate generation for Docker/CMON setup
rcgen = { workspace = true }
# rand_core (not rand) because the crypto-stack crates (p256, p384,
# rsa, ed25519-dalek) pin rand_core 0.6 and their `*::random(&mut _)`
# APIs want the 0.6 `RngCore` / `CryptoRng` traits. Using `rand` 0.9
# here would pull a second rand_core (0.9) into the graph and fail to
# satisfy those trait bounds.
rand_core = { version = "0.6", features = ["std", "getrandom"] }
der = "0.7"
time = "0.3"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
serial_test = "3"
tempfile = { workspace = true }
