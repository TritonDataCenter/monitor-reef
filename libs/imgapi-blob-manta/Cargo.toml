[package]
name = "imgapi-blob-manta"
version = "0.1.0"
edition.workspace = true
description = "S3-backed blob storage for IMGAPI image content (mantad-compatible)"

[lints]
workspace = true

[lib]
name = "imgapi_blob_manta"
path = "src/lib.rs"

[dependencies]
anyhow = { workspace = true }
reqwest = { workspace = true, features = ["stream"] }
# rustls + webpki-roots are required so reqwest's TLS config has a
# trust store on illumos / any host where the platform verifier
# can't find one. Without this BlobStore::new fails with
# "No CA certificates were loaded from the system" when called
# from monroe / similar SmartOS GZs.
rustls = { workspace = true }
rusty-s3 = { workspace = true }
sha1 = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["fs", "io-util"] }
tokio-util = { workspace = true, features = ["codec", "io"] }
tracing = { workspace = true }
url = { workspace = true }
uuid = { workspace = true, features = ["serde"] }
webpki-roots = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
