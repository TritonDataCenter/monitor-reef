[package]
name = "identity-token"
version = "0.1.0"
edition.workspace = true
description = "Self-contained verifier for identityd-issued access tokens. No tritond or FoundationDB dependencies; tritond, the storage tier, and the Workbench BFF all link this one crate."
license = "MPL-2.0"

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true }
jsonwebtoken = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
