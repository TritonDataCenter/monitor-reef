[package]
name = "tritond-placement"
version = "0.1.0"
edition.workspace = true
description = "VM placement engine for the Triton Cloud control plane: Filter / Scorer traits, the chain runner, the ExplainReport. See RFD 00005."
license = "MPL-2.0"

[lints]
workspace = true

[features]
default = []
# The load materialiser pulls in the ClickHouse client crate the
# metrics pipeline already uses. Off by default so unit tests and
# `make docker-up` builds stay lean. PL-6 turns this on inside
# `tritond` to start the materialiser task. PL-1 ships the feature
# flag; the materialiser module body lands in PL-6.
materializer = []

[dependencies]
chrono = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
# RFD 00005 PL-3+: filters/scorers read the canonical store row
# shapes (InstanceAffinity, AffinityRule, ...) directly. The
# projection types in src/types.rs (CapacityView, ...) remain as
# the engine's projection over CnCapacity / CnPlacement / ...; the
# join from raw rows to projection happens at PL-5's
# get_cn_view_for_pick helper.
tritond-store = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
