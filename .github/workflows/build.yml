name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-triton:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: triton-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: triton-linux-arm64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: triton-macos-arm64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.artifact }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # 5.0.1
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@0f44b27771c32bda9f458f75a1e241b09791b331 # 1.91.1
        with:
          toolchain: 1.92

      - name: Cache cargo
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # 2.8.1
        with:
          key: ${{ matrix.target }}

      - name: Build triton (release)
        run: cargo build --release --package triton-cli

      - name: Package binary
        run: |
          cp target/release/triton triton
          tar -czf ${{ matrix.artifact }}.tar.gz triton

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # 4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          retention-days: ${{ github.event_name == 'pull_request' && 7 || 30 }}
