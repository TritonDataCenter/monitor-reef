resolver = "2"

[workspace.package]
edition = "2024"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"

[workspace.dependencies]
askama = "0.15"
axum = { version = "0.8", features = ["ws"] }
anyhow = "1.0"
build-data = "0.2"
camino = "1.1"
cargo_toml = "0.22"
chrono = "0.4"
clap = { version = "4.5", features = ["derive", "env"] }
dropshot = { version = "0.16" }
dropshot-api-manager = "0.3"
dropshot-api-manager-types = "0.3"
config = "0.14"
http = "1"
hyper = { version = "1", features = ["full"] }
hyper-util = { version = "0.1", features = ["client-legacy", "http1", "tokio"] }
jsonwebtoken = "9.3"
ldap3 = { version = "0.11", default-features = false, features = ["tls-rustls"] }
openapiv3 = "2.0"
p256 = { version = "0.13", default-features = false, features = ["ecdsa", "jwk", "pem", "std"] }
progenitor = "0.12"
progenitor-client = "0.12"
progenitor-impl = "0.12"
rand = "0.8"
rustfmt-wrapper = "0.2"

#
# rustls crypto provider selection -- EDIT ALL FIVE PLACES TOGETHER.
#
# This repo standardises on the `ring` provider. Rustls refuses to
# auto-select a provider when more than one is feature-enabled in the
# build, so every crate that brings rustls in transitively must agree.
#
# To switch to `aws-lc-rs`:
#   1) Change `ring` -> `aws-lc-rs` in `hyper-rustls` below.
#   2) Change `ring` -> `aws-lc-rs` in `rustls` below.
#   3) Change `ring` -> `aws-lc-rs` in `tokio-rustls` below.
#   4) Change reqwest's feature `rustls-no-provider` -> `rustls`
#      (reqwest's `rustls` feature activates `aws-lc-rs` automatically).
#   5) Change `rustls::crypto::ring::default_provider()` to
#      `rustls::crypto::aws_lc_rs::default_provider()` in
#      `services/triton-gateway/src/main.rs` (the explicit install
#      before any ClientConfig is built).
#
# reqwest also needs to track with progenitor-client.
#
hyper-rustls = { version = "0.27", default-features = false, features = ["http1", "logging", "native-tokio", "tls12", "ring"] }
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls-no-provider"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
tokio-rustls = { version = "0.26", default-features = false, features = ["ring", "tls12", "logging"] }
# NOTE: schemars version is tied to dropshot compatibility
# Dropshot 0.16.x requires schemars 0.8.x
# Do not upgrade to schemars 1.x without also upgrading dropshot
schemars = { version = "0.8", features = ["derive"] }
secrecy = { version = "0.10", features = ["serde"] }
semver = "1.0"
serde = { version = "1.0", features = ["derive"] }
strum = { version = "0.27", features = ["derive"] }
serde_json = "1.0"
tempfile = "3"
thiserror = "2.0"
tokio = { version = "1.48", features = ["full"] }
tokio-tungstenite = { version = "0.28", features = ["rustls-tls-webpki-roots"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4", "serde"] }

#
# Internal workspace crates.
#
# All intra-workspace dependencies are declared here and pulled in by
# consumers with `workspace = true`, so crate Cargo.tomls do not carry
# relative `../../...` paths.
#
bugview-api = { path = "apis/bugview-api" }
bugview-client = { path = "clients/internal/bugview-client" }
cloudapi-api = { path = "apis/cloudapi-api" }
imgapi-api = { path = "apis/imgapi-api" }
imgapi-client = { path = "clients/internal/imgapi-client" }
jira-api = { path = "apis/jira-api" }
