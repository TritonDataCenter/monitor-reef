[workspace]
members = [
    "apis/bugview-api",
    "apis/cloudapi-api",
    "apis/imgapi-api",
    "apis/jira-api",
    "apis/napi-api",
    "apis/papi-api",
    "apis/sapi-api",
    "apis/triton-api",
    "apis/vmapi-api",
    "cli/bugview-cli",
    "cli/triton-cli",
    "cli/tritonadm",
    "cli/sapi-cli",
    "cli/napi-cli",
    "cli/papi-cli",
    "cli/vmapi-cli",
    "clients/internal/bugview-client",
    "clients/internal/cloudapi-client",
    "clients/internal/imgapi-client",
    "clients/internal/jira-client",
    "clients/internal/napi-client",
    "clients/internal/papi-client",
    "clients/internal/sapi-client",
    "clients/internal/vmapi-client",
    "libs/triton-auth",
    "libs/triton-tls",
    "client-generator",
    "openapi-manager",
    "services/bugview-service",
    "services/jira-stub-server",
    "services/triton-api-server",

    # To be modernized:
    #"cli/manatee-echo-resolver",
    #"libs/cueball-dns-resolver",
    #"libs/cueball-manatee-primary-resolver",
    #"libs/cueball-postgres-connection",
    #"libs/cueball-static-resolver",
    #"libs/cueball-tcp-stream-connection",
    #"libs/cueball",
    #"libs/fast",
    #"libs/libmanta",
    #"libs/moray",
    #"libs/quickcheck-helpers",
    #"libs/rebalancer-legacy/agent",
    #"libs/rebalancer-legacy/manager",
    #"libs/rebalancer-legacy/rebalancer",
    #"libs/rust-utils",
    #"libs/sharkspotter",
]
resolver = "2"

[workspace.package]
edition = "2024"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"

[workspace.dependencies]
askama = "0.15"
anyhow = "1.0"
build-data = "0.2"
camino = "1.1"
cargo_toml = "0.22"
chrono = "0.4"
clap = { version = "4.5", features = ["derive"] }
dropshot = { version = "0.16" }
dropshot-api-manager = "0.3"
dropshot-api-manager-types = "0.3"
openapiv3 = "2.0"
progenitor = "0.12"
progenitor-client = "0.12"
progenitor-impl = "0.12"
rustfmt-wrapper = "0.2"
# reqwest needs to track with progenitor-client
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls"] }
# NOTE: schemars version is tied to dropshot compatibility
# Dropshot 0.16.x requires schemars 0.8.x
# Do not upgrade to schemars 1.x without also upgrading dropshot
schemars = { version = "0.8", features = ["derive"] }
semver = "1.0"
serde = { version = "1.0", features = ["derive"] }
strum = { version = "0.27", features = ["derive"] }
serde_json = "1.0"
tempfile = "3"
thiserror = "2.0"
tokio = { version = "1.48", features = ["full"] }
tokio-tungstenite = { version = "0.28", features = ["rustls-tls-webpki-roots"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4", "serde"] }
