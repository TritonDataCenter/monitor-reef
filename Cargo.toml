jira-stub-server = { path = "services/jira-stub-server" }
mahi-api = { path = "apis/mahi-api" }
mahi-client = { path = "clients/internal/mahi-client" }
mahi-sitter-client = { path = "clients/internal/mahi-sitter-client" }
napi-api = { path = "apis/napi-api" }
napi-client = { path = "clients/internal/napi-client" }
papi-api = { path = "apis/papi-api" }
papi-client = { path = "clients/internal/papi-client" }
sapi-api = { path = "apis/sapi-api" }
sapi-client = { path = "clients/internal/sapi-client" }
triton-api = { path = "apis/triton-api" }
triton-auth = { path = "libs/triton-auth" }
triton-auth-session = { path = "libs/triton-auth-session" }
triton-gateway-client = { path = "clients/internal/triton-gateway-client" }
triton-pagination = { path = "libs/triton-pagination" }
triton-tls = { path = "libs/triton-tls" }
vmapi-api = { path = "apis/vmapi-api" }
